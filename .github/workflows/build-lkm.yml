name: Build LKM for KernelSU
on:
  workflow_call:
    inputs:
      expected_size2:
        description: 'Second expected signature size (for PR builds)'
        required: false
        default: ''
        type: string
      expected_hash2:
        description: 'Second expected signature hash (for PR builds)'
        required: false
        default: ''
        type: string
  workflow_dispatch:
jobs:
  build-lkm:
    strategy:
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'
      expected_size2: '0x346'
      expected_hash2: '3547425cb84249bef20d0fffddab59e2d7213b0ddbab86cc8dcbd1bfaa566515'
