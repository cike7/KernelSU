name: Build LKM for KernelSU
on:
  workflow_call:
    inputs:
      expected_size2:
        description: 'Second expected signature size (for PR builds)'
        required: true
        default: '0x2e8'
        type: string
      expected_hash2:
        description: 'Second expected signature hash (for PR builds)'
        required: true
        default: '53fd71a8c91870c773ae7a9028bcf0d4479f9a08bade3f4918c3c65cbd02f547'
        type: string
  workflow_dispatch:
jobs:
  build-lkm:
    strategy:
      matrix:
        kmi:
          - android12-5.10
          - android13-5.10
          - android13-5.15
          - android14-5.15
          - android14-6.1
          - android15-6.6
          - android16-6.12
    uses: ./.github/workflows/ddk-lkm.yml
    with:
      kmi: ${{ matrix.kmi }}
      ddk_release: '20260313'
      expected_size2: ${{ inputs.expected_size2 || '' }}
      expected_hash2: ${{ inputs.expected_hash2 || '' }}
